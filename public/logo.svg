<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5924d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#orangeGradient)"/>
  
  <!-- 驴头轮廓 -->
  <ellipse cx="50" cy="52" rx="22" ry="24" fill="white"/>
  
  <!-- 左耳 -->
  <path d="M30 42 L28 18 L38 35 Z" fill="white"/>
  <path d="M31 40 L30 22 L36 35 Z" fill="#F37021" opacity="0.6"/>
  
  <!-- 右耳 -->
  <path d="M70 42 L72 18 L62 35 Z" fill="white"/>
  <path d="M69 40 L70 22 L64 35 Z" fill="#F37021" opacity="0.6"/>
  
  <!-- 左眼 - 倔强的小眼神 -->
  <ellipse cx="40" cy="48" rx="4" ry="5" fill="#333"/>
  <circle cx="38.5" cy="46" r="1.5" fill="white"/>
  
  <!-- 右眼 -->
  <ellipse cx="60" cy="48" rx="4" ry="5" fill="#333"/>
  <circle cx="58.5" cy="46" r="1.5" fill="white"/>
  
  <!-- 眉毛 - 倔强的表情 -->
  <path d="M34 40 Q40 38 46 41" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M54 41 Q60 38 66 40" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- 鼻子 -->
  <ellipse cx="50" cy="62" rx="12" ry="8" fill="#f5f5f5"/>
  <circle cx="44" cy="62" r="3" fill="#333"/>
  <circle cx="56" cy="62" r="3" fill="#333"/>
  
  <!-- 嘴巴 - 不服气的嘴角 -->
  <path d="M42 72 Q50 68 58 72" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 鬃毛 -->
  <path d="M35 30 Q30 35 32 45" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M65 30 Q70 35 68 45" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>