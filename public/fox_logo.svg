<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 狐狸毛色渐变 -->
    <linearGradient id="furOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021"/>
      <stop offset="40%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#d45c10"/>
    </linearGradient>
    
    <!-- 白毛渐变 -->
    <linearGradient id="furWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    
    <!-- 耳朵内部渐变 -->
    <linearGradient id="earInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb088"/>
      <stop offset="100%" style="stop-color:#f08050"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内发光 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  
  <!-- 背景装饰 -->
  <circle cx="80" cy="20" r="30" fill="rgba(243,112,33,0.08)"/>
  <circle cx="20" cy="80" r="25" fill="rgba(243,112,33,0.05)"/>
  
  <!-- ===== 狐狸头部 ===== -->
  
  <!-- 左耳外部 -->
  <path d="M22 52 L12 8 L38 38 Z" fill="url(#furOrange)" filter="url(#shadow)"/>
  <!-- 左耳内部 -->
  <path d="M22 48 L16 18 L32 40 Z" fill="url(#earInner)"/>
  <!-- 左耳高光 -->
  <path d="M18 45 L14 22 L24 40 Z" fill="rgba(255,255,255,0.15)"/>
  
  <!-- 右耳外部 -->
  <path d="M78 52 L88 8 L62 38 Z" fill="url(#furOrange)" filter="url(#shadow)"/>
  <!-- 右耳内部 -->
  <path d="M78 48 L84 18 L68 40 Z" fill="url(#earInner)"/>
  <!-- 右耳高光 -->
  <path d="M82 45 L86 22 L76 40 Z" fill="rgba(255,255,255,0.15)"/>
  
  <!-- 脸部主体 - 橙色毛发 -->
  <ellipse cx="50" cy="58" rx="35" ry="32" fill="url(#furOrange)" filter="url(#shadow)"/>
  
  <!-- 脸颊两侧高光 -->
  <ellipse cx="30" cy="55" rx="12" ry="10" fill="rgba(255,255,255,0.12)"/>
  <ellipse cx="70" cy="55" rx="12" ry="10" fill="rgba(255,255,255,0.12)"/>
  
  <!-- 额头毛发纹理 -->
  <path d="M35 38 Q50 32, 65 38" stroke="rgba(0,0,0,0.1)" stroke-width="1" fill="none"/>
  <path d="M40 42 Q50 37, 60 42" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" fill="none"/>
  
  <!-- 白色面罩区域 -->
  <path d="M30 58 
           Q35 48, 50 45 
           Q65 48, 70 58 
           Q72 70, 65 78
           Q55 88, 50 90
           Q45 88, 35 78
           Q28 70, 30 58 Z" 
        fill="url(#furWhite)"/>
  
  <!-- 白色面罩阴影 -->
  <path d="M35 60 Q50 52, 65 60" stroke="rgba(0,0,0,0.05)" stroke-width="1" fill="none"/>
  
  <!-- ===== 眼睛 ===== -->
  
  <!-- 左眼眶 -->
  <ellipse cx="36" cy="56" rx="9" ry="7" fill="#1a1a1a"/>
  <!-- 左眼球 -->
  <ellipse cx="36" cy="56" rx="7" ry="5.5" fill="#2d2d2d"/>
  <!-- 左瞳孔 -->
  <ellipse cx="36" cy="56" rx="4" ry="4.5" fill="#0a0a0a"/>
  <!-- 左瞳孔高光 -->
  <circle cx="34" cy="54" r="2" fill="white" opacity="0.9"/>
  <circle cx="37" cy="57" r="0.8" fill="white" opacity="0.5"/>
  <!-- 左眼反光 -->
  <path d="M32 54 Q36 52, 40 54" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" fill="none"/>
  
  <!-- 右眼眶 -->
  <ellipse cx="64" cy="56" rx="9" ry="7" fill="#1a1a1a"/>
  <!-- 右眼球 -->
  <ellipse cx="64" cy="56" rx="7" ry="5.5" fill="#2d2d2d"/>
  <!-- 右瞳孔 -->
  <ellipse cx="64" cy="56" rx="4" ry="4.5" fill="#0a0a0a"/>
  <!-- 右瞳孔高光 -->
  <circle cx="62" cy="54" r="2" fill="white" opacity="0.9"/>
  <circle cx="65" cy="57" r="0.8" fill="white" opacity="0.5"/>
  <!-- 右眼反光 -->
  <path d="M60 54 Q64 52, 68 54" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" fill="none"/>
  
  <!-- ===== 鼻子 ===== -->
  
  <!-- 鼻子主体 -->
  <ellipse cx="50" cy="74" rx="6" ry="4.5" fill="#1a1a1a"/>
  <!-- 鼻子高光 -->
  <ellipse cx="48" cy="73" rx="2.5" ry="1.5" fill="rgba(255,255,255,0.25)"/>
  <!-- 鼻孔 -->
  <ellipse cx="48" cy="76" rx="1.2" ry="0.8" fill="#0a0a0a"/>
  <ellipse cx="52" cy="76" rx="1.2" ry="0.8" fill="#0a0a0a"/>
  
  <!-- ===== 嘴巴 ===== -->
  
  <!-- 上嘴唇线 -->
  <path d="M50 78.5 L50 82" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 左嘴线 -->
  <path d="M50 82 Q42 85, 38 83" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 右嘴线 -->
  <path d="M50 82 Q58 85, 62 83" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- ===== 胡须 ===== -->
  
  <!-- 左边胡须 -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="0.8" stroke-linecap="round">
    <line x1="28" y1="68" x2="12" y2="64"/>
    <line x1="28" y1="72" x2="10" y2="72"/>
    <line x1="28" y1="76" x2="12" y2="80"/>
  </g>
  
  <!-- 右边胡须 -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="0.8" stroke-linecap="round">
    <line x1="72" y1="68" x2="88" y2="64"/>
    <line x1="72" y1="72" x2="90" y2="72"/>
    <line x1="72" y1="76" x2="88" y2="80"/>
  </g>
  
  <!-- ===== 装饰 ===== -->
  
  <!-- 头顶毛发 -->
  <path d="M42 32 Q45 28, 48 32 Q52 26, 56 32" stroke="url(#furOrange)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 环境光点 -->
  <circle cx="25" cy="35" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="75" cy="38" r="1.2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="15" cy="60" r="0.8" fill="rgba(243,112,33,0.3)"/>
  <circle cx="85" cy="55" r="1" fill="rgba(243,112,33,0.25)"/>
</svg>