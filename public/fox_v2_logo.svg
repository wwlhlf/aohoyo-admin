<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <linearGradient id="furOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021"/>
      <stop offset="50%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#d45c10"/>
    </linearGradient>
    
    <linearGradient id="furWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    
    <linearGradient id="earInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb088"/>
      <stop offset="100%" style="stop-color:#f08050"/>
    </linearGradient>
    
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d45c10"/>
      <stop offset="60%" style="stop-color:#F37021"/>
      <stop offset="90%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="160" height="120" rx="15" fill="url(#bgGrad)"/>
  
  <!-- 背景装饰 -->
  <circle cx="135" cy="20" r="30" fill="rgba(243,112,33,0.06)"/>
  <circle cx="25" cy="100" r="25" fill="rgba(243,112,33,0.05)"/>
  
  <!-- ===== 整体狐狸轮廓 - 连贯的身体 ===== -->
  
  <!-- 尾巴 + 身体 + 头 一体轮廓 -->
  <path d="
    M20 70
    C8 65, 5 55, 10 45
    C15 35, 28 32, 35 38
    C40 42, 42 50, 45 55
    C50 65, 55 72, 65 75
    C80 80, 95 78, 105 70
    C115 62, 120 52, 125 45
    C130 38, 140 42, 145 50
    C150 58, 148 68, 140 72
    C135 75, 130 78, 125 85
    C120 92, 110 95, 100 92
    C90 89, 85 88, 80 90
    C75 92, 70 95, 65 95
    C55 95, 50 92, 45 88
    C38 82, 32 78, 25 75
    C22 73, 20 70, 20 70
    Z"
    fill="url(#furOrange)" filter="url(#shadow)"/>
  
  <!-- 尾巴白尖 -->
  <path d="
    M10 45
    C15 35, 28 32, 35 38
    C40 42, 42 50, 38 52
    C32 48, 25 45, 18 48
    C12 50, 10 45, 10 45
    Z"
    fill="url(#tailGrad)"/>
  
  <!-- 尾巴毛流感 -->
  <path d="M12 48 Q20 44, 28 40" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
  <path d="M15 52 Q22 48, 30 44" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" fill="none"/>
  <path d="M18 42 Q24 38, 30 36" stroke="rgba(255,255,255,0.18)" stroke-width="0.7" fill="none"/>
  
  <!-- 胸部白毛 - 自然过渡 -->
  <path d="
    M95 60
    C100 65, 105 72, 108 80
    C110 85, 108 90, 100 92
    C90 89, 85 88, 80 90
    C75 92, 70 95, 65 95
    C60 95, 58 90, 60 85
    C62 78, 70 72, 80 68
    C88 64, 92 62, 95 60
    Z"
    fill="url(#furWhite)"/>
  
  <!-- 后腿 -->
  <path d="
    M50 82
    C48 88, 50 95, 55 98
    C60 100, 65 98, 65 95
    C65 92, 62 88, 58 85
    C54 82, 50 82, 50 82
    Z"
    fill="url(#furOrange)"/>
  <!-- 后爪白 -->
  <ellipse cx="57" cy="97" rx="7" ry="4" fill="url(#furWhite)"/>
  
  <!-- 前腿 -->
  <path d="
    M105 82
    C108 88, 110 95, 108 100
    C106 103, 100 103, 97 100
    C94 97, 95 92, 98 88
    C100 84, 105 82, 105 82
    Z"
    fill="url(#furOrange)"/>
  <!-- 前爪白 -->
  <ellipse cx="102" cy="101" rx="6" ry="3.5" fill="url(#furWhite)"/>
  
  <!-- ===== 头部 ===== -->
  
  <!-- 左耳 -->
  <path d="M115 35 L105 8 L130 30 Z" fill="url(#furOrange)"/>
  <path d="M115 32 L110 15 L125 30 Z" fill="url(#earInner)"/>
  
  <!-- 右耳 -->
  <path d="M155 35 L165 8 L140 30 Z" fill="url(#furOrange)"/>
  <path d="M155 32 L160 15 L145 30 Z" fill="url(#earInner)"/>
  
  <!-- 脸部 -->
  <ellipse cx="135" cy="45" rx="22" ry="18" fill="url(#furOrange)"/>
  
  <!-- 脸颊高光 -->
  <ellipse cx="122" cy="42" rx="5" ry="4" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="148" cy="42" rx="5" ry="4" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 白色面罩 -->
  <path d="
    M122 48
    C126 40, 135 38, 135 38
    C135 38, 144 40, 148 48
    C150 55, 148 62, 145 65
    C140 70, 135 72, 135 72
    C135 72, 130 70, 125 65
    C120 60, 122 48, 122 48
    Z"
    fill="url(#furWhite)"/>
  
  <!-- 眼睛 -->
  <ellipse cx="127" cy="48" rx="5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="127" cy="48" rx="3" ry="2.5" fill="#0a0a0a"/>
  <circle cx="125.5" cy="46.5" r="1.2" fill="white"/>
  <circle cx="128" cy="49" r="0.5" fill="white" opacity="0.4"/>
  
  <ellipse cx="143" cy="48" rx="5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="143" cy="48" rx="3" ry="2.5" fill="#0a0a0a"/>
  <circle cx="141.5" cy="46.5" r="1.2" fill="white"/>
  <circle cx="144" cy="49" r="0.5" fill="white" opacity="0.4"/>
  
  <!-- 鼻子 -->
  <ellipse cx="135" cy="58" rx="4" ry="3" fill="#1a1a1a"/>
  <ellipse cx="133.5" cy="57" rx="1.5" ry="1" fill="rgba(255,255,255,0.2)"/>
  
  <!-- 嘴巴 -->
  <path d="M135 61 L135 63" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
  <path d="M135 63 Q131 65, 129 64" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M135 63 Q139 65, 141 64" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="0.5" stroke-linecap="round">
    <line x1="120" y1="54" x2="112" y2="52"/>
    <line x1="120" y1="56" x2="111" y2="56"/>
    <line x1="150" y1="54" x2="158" y2="52"/>
    <line x1="150" y1="56" x2="159" y2="56"/>
  </g>
  
  <!-- 装饰光点 -->
  <circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.12)"/>
  <circle cx="145" cy="25" r="1" fill="rgba(255,255,255,0.1)"/>
</svg>