<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="orangeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021"/>
      <stop offset="100%" style="stop-color:#f5924d"/>
    </linearGradient>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#orangeBg)"/>
  
  <!-- 蛇身体 - S形曲线 -->
  <path d="M25 20 
           Q15 30, 25 40 
           Q35 50, 25 60 
           Q15 70, 25 80
           Q35 90, 45 85
           Q55 80, 60 70
           Q65 60, 70 65"
        stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- 蛇头 -->
  <ellipse cx="75" cy="62" rx="12" ry="9" fill="white"/>
  
  <!-- 左眼 -->
  <circle cx="72" cy="60" r="2.5" fill="#333"/>
  <circle cx="71" cy="59" r="1" fill="white"/>
  
  <!-- 右眼 -->
  <circle cx="78" cy="60" r="2.5" fill="#333"/>
  <circle cx="77" cy="59" r="1" fill="white"/>
  
  <!-- 舌头 -->
  <path d="M87 62 L95 58 M87 62 L95 66" stroke="#e53935" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 蛇尾尖 -->
  <path d="M25 20 Q20 15, 22 10" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>