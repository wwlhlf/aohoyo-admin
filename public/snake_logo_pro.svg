<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021"/>
      <stop offset="50%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#F37021"/>
    </linearGradient>
    
    <!-- 蛇身渐变 -->
    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    
    <!-- 蛇身高光 -->
    <linearGradient id="snakeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
    
    <!-- 鳞片图案 -->
    <pattern id="scales" patternUnits="userSpaceOnUse" width="8" height="6">
      <path d="M0 3 Q4 0, 8 3 Q4 6, 0 3" fill="none" stroke="#ddd" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  
  <!-- 背景装饰圆 -->
  <circle cx="80" cy="20" r="25" fill="rgba(255,255,255,0.08)"/>
  <circle cx="15" cy="85" r="15" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 蛇身体阴影 -->
  <path d="M20 18 
           Q8 28, 18 42 
           Q28 56, 16 68 
           Q8 80, 22 88
           Q38 96, 52 88
           Q66 80, 74 68
           Q82 56, 86 62
           Q88 66, 92 64"
        stroke="rgba(0,0,0,0.15)" stroke-width="14" fill="none" stroke-linecap="round"/>
  
  <!-- 蛇身体主体 -->
  <path d="M18 16 
           Q6 26, 16 40 
           Q26 54, 14 66 
           Q6 78, 20 86
           Q36 94, 50 86
           Q64 78, 72 66
           Q80 54, 84 60
           Q86 64, 90 62"
        stroke="url(#snakeGrad)" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- 蛇身高光线 -->
  <path d="M18 14 
           Q6 24, 16 38 
           Q26 52, 14 64 
           Q6 76, 20 84
           Q36 92, 50 84
           Q64 76, 72 64
           Q80 52, 84 58"
        stroke="rgba(255,255,255,0.6)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 鳞片纹理 -->
  <g opacity="0.3">
    <ellipse cx="22" cy="28" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="16" cy="50" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="20" cy="72" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="38" cy="86" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="58" cy="78" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="72" cy="64" rx="3" ry="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
  </g>
  
  <!-- 蛇尾尖 -->
  <path d="M18 16 Q12 10, 14 4 Q16 2, 18 6 Q14 12, 18 16" fill="white" filter="url(#shadow)"/>
  
  <!-- 蛇头 -->
  <ellipse cx="88" cy="58" rx="10" ry="8" fill="url(#snakeGrad)" filter="url(#shadow)"/>
  
  <!-- 蛇头纹理 -->
  <ellipse cx="88" cy="58" rx="8" ry="6" fill="none" stroke="#eee" stroke-width="0.5" opacity="0.5"/>
  
  <!-- 眼眶 -->
  <ellipse cx="84" cy="55" rx="3.5" ry="3" fill="#2a2a2a"/>
  <ellipse cx="91" cy="55" rx="3.5" ry="3" fill="#2a2a2a"/>
  
  <!-- 眼球 -->
  <ellipse cx="84" cy="55" rx="2" ry="2.5" fill="#1a1a1a"/>
  <ellipse cx="91" cy="55" rx="2" ry="2.5" fill="#1a1a1a"/>
  
  <!-- 瞳孔竖线 -->
  <ellipse cx="84" cy="55" rx="0.8" ry="2" fill="#000"/>
  <ellipse cx="91" cy="55" rx="0.8" ry="2" fill="#000"/>
  
  <!-- 眼睛高光 -->
  <circle cx="83" cy="54" r="1" fill="white" opacity="0.9"/>
  <circle cx="90" cy="54" r="1" fill="white" opacity="0.9"/>
  <circle cx="85" cy="56" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="92" cy="56" r="0.5" fill="white" opacity="0.5"/>
  
  <!-- 鼻孔 -->
  <circle cx="86" cy="61" r="0.8" fill="#ccc"/>
  <circle cx="90" cy="61" r="0.8" fill="#ccc"/>
  
  <!-- 舌头 -->
  <g>
    <!-- 舌头主体 -->
    <path d="M98 58 L106 54" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
    <path d="M98 58 L106 62" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
    <path d="M96 58 L98 58" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 舌头高光 -->
    <path d="M97 57 L104 53" stroke="#ff5252" stroke-width="0.5" stroke-linecap="round"/>
    <path d="M97 59 L104 63" stroke="#ff5252" stroke-width="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- 装饰光点 -->
  <circle cx="25" cy="22" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="12" cy="58" r="1" fill="white" opacity="0.3"/>
  <circle cx="45" cy="88" r="1.2" fill="white" opacity="0.35"/>
</svg>