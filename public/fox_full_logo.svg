<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 狐狸毛色渐变 -->
    <linearGradient id="furOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F37021"/>
      <stop offset="50%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#d45c10"/>
    </linearGradient>
    
    <!-- 白毛渐变 -->
    <linearGradient id="furWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    
    <!-- 耳朵内部 -->
    <linearGradient id="earInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb088"/>
      <stop offset="100%" style="stop-color:#f08050"/>
    </linearGradient>
    
    <!-- 尾巴渐变 -->
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d45c10"/>
      <stop offset="50%" style="stop-color:#F37021"/>
      <stop offset="85%" style="stop-color:#f5924d"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect x="0" y="0" width="120" height="100" rx="15" fill="url(#bgGrad)"/>
  
  <!-- 背景装饰 -->
  <circle cx="100" cy="15" r="25" fill="rgba(243,112,33,0.06)"/>
  <circle cx="20" cy="85" r="20" fill="rgba(243,112,33,0.05)"/>
  
  <!-- ===== 尾巴 ===== -->
  
  <!-- 尾巴主体 -->
  <path d="M15 55 Q5 50, 8 40 Q12 28, 25 25 Q38 22, 35 35 Q32 48, 25 55 Q20 60, 15 55 Z" 
        fill="url(#tailGrad)" filter="url(#shadow)"/>
  
  <!-- 尾巴毛流感 -->
  <path d="M12 45 Q18 42, 22 38" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
  <path d="M10 40 Q16 36, 22 32" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" fill="none"/>
  <path d="M14 50 Q20 47, 24 43" stroke="rgba(255,255,255,0.18)" stroke-width="0.7" fill="none"/>
  
  <!-- ===== 身体 ===== -->
  
  <!-- 后腿 -->
  <ellipse cx="35" cy="85" rx="12" ry="8" fill="url(#furOrange)"/>
  <ellipse cx="35" cy="88" rx="8" ry="5" fill="url(#furWhite)"/>
  
  <!-- 身体主体 -->
  <ellipse cx="60" cy="70" rx="28" ry="22" fill="url(#furOrange)" filter="url(#shadow)"/>
  
  <!-- 身体高光 -->
  <ellipse cx="55" cy="62" rx="15" ry="10" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 胸前白毛 -->
  <ellipse cx="75" cy="75" rx="14" ry="18" fill="url(#furWhite)"/>
  <ellipse cx="78" cy="78" rx="10" ry="12" fill="rgba(255,255,255,0.3)"/>
  
  <!-- 前腿 -->
  <ellipse cx="82" cy="88" rx="10" ry="7" fill="url(#furOrange)"/>
  <ellipse cx="82" cy="90" rx="6" ry="4" fill="url(#furWhite)"/>
  
  <!-- 前腿2 -->
  <ellipse cx="70" cy="88" rx="8" ry="6" fill="url(#furOrange)"/>
  <ellipse cx="70" cy="90" rx="5" ry="4" fill="url(#furWhite)"/>
  
  <!-- ===== 头部 ===== -->
  
  <!-- 左耳外部 -->
  <path d="M72 28 L62 5 L85 22 Z" fill="url(#furOrange)" filter="url(#shadow)"/>
  <!-- 左耳内部 -->
  <path d="M72 25 L66 12 L80 23 Z" fill="url(#earInner)"/>
  <!-- 左耳高光 -->
  <path d="M70 23 L67 14 L77 22 Z" fill="rgba(255,255,255,0.12)"/>
  
  <!-- 右耳外部 -->
  <path d="M108 28 L118 5 L95 22 Z" fill="url(#furOrange)" filter="url(#shadow)"/>
  <!-- 右耳内部 -->
  <path d="M108 25 L114 12 L100 23 Z" fill="url(#earInner)"/>
  <!-- 右耳高光 -->
  <path d="M110 23 L113 14 L103 22 Z" fill="rgba(255,255,255,0.12)"/>
  
  <!-- 脸部主体 -->
  <ellipse cx="90" cy="38" rx="22" ry="20" fill="url(#furOrange)" filter="url(#shadow)"/>
  
  <!-- 脸颊高光 -->
  <ellipse cx="78" cy="36" rx="6" ry="5" fill="rgba(255,255,255,0.12)"/>
  <ellipse cx="102" cy="36" rx="6" ry="5" fill="rgba(255,255,255,0.12)"/>
  
  <!-- 白色面罩 -->
  <path d="M78 40 Q82 32, 90 30 Q98 32, 102 40 Q105 50, 100 55 Q95 60, 90 62 Q85 60, 80 55 Q75 50, 78 40 Z" 
        fill="url(#furWhite)"/>
  
  <!-- ===== 眼睛 ===== -->
  
  <!-- 左眼 -->
  <ellipse cx="82" cy="40" rx="5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="82" cy="40" rx="4" ry="3" fill="#2d2d2d"/>
  <ellipse cx="82" cy="40" rx="2.5" ry="2.5" fill="#0a0a0a"/>
  <circle cx="80.5" cy="38.5" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="83" cy="41" r="0.5" fill="white" opacity="0.4"/>
  
  <!-- 右眼 -->
  <ellipse cx="98" cy="40" rx="5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="98" cy="40" rx="4" ry="3" fill="#2d2d2d"/>
  <ellipse cx="98" cy="40" rx="2.5" ry="2.5" fill="#0a0a0a"/>
  <circle cx="96.5" cy="38.5" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="99" cy="41" r="0.5" fill="white" opacity="0.4"/>
  
  <!-- ===== 鼻子 ===== -->
  <ellipse cx="90" cy="50" rx="4" ry="3" fill="#1a1a1a"/>
  <ellipse cx="88.5" cy="49" rx="1.5" ry="1" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="89" cy="52" rx="0.8" ry="0.5" fill="#0a0a0a"/>
  <ellipse cx="91" cy="52" rx="0.8" ry="0.5" fill="#0a0a0a"/>
  
  <!-- 嘴巴 -->
  <path d="M90 53 L90 55" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
  <path d="M90 55 Q86 57, 84 56" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M90 55 Q94 57, 96 56" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <!-- ===== 胡须 ===== -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="0.6" stroke-linecap="round">
    <line x1="76" y1="46" x2="68" y2="44"/>
    <line x1="76" y1="48" x2="67" y2="48"/>
    <line x1="76" y1="50" x2="68" y2="52"/>
    <line x1="104" y1="46" x2="112" y2="44"/>
    <line x1="104" y1="48" x2="113" y2="48"/>
    <line x1="104" y1="50" x2="112" y2="52"/>
  </g>
  
  <!-- 装饰光点 -->
  <circle cx="65" cy="25" r="1" fill="rgba(255,255,255,0.15)"/>
  <circle cx="115" cy="20" r="0.8" fill="rgba(255,255,255,0.12)"/>
  <circle cx="10" cy="35" r="1" fill="rgba(243,112,33,0.25)"/>
</svg>